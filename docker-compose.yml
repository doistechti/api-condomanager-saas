services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: unless-stopped
    command:
      # Logs
      - --log.level=INFO

      # Dashboard (opcional; deixe false por segurança)
      - --api.dashboard=false

      # Providers
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false

      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443

      # Redirect HTTP -> HTTPS
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https

      # Let's Encrypt (HTTP-01)
      - --certificatesresolvers.le.acme.email=${TRAEFIK_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - web

  api-condomanager-saas:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-condomanager-saas
    restart: unless-stopped
    environment:
      BANCO_HOST_PRD: ${BANCO_HOST_PRD}
      BANCO_PORTA_PRD: ${BANCO_PORTA_PRD:-3306}
      BANCO_SCHEMA_PRD: ${BANCO_SCHEMA_PRD}
      BANCO_USUARIO_PRD: ${BANCO_USUARIO_PRD}
      BANCO_SENHA_PRD: ${BANCO_SENHA_PRD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MINUTES: ${APP_JWT_EXPIRATION_MINUTES:-480}
      APP_MAIL_FROM: ${APP_MAIL_FROM}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL}
      APP_FRONTEND_MORADOR_CONVITE_PATH: ${APP_FRONTEND_MORADOR_CONVITE_PATH:-/convite/morador}
      APP_CONVITE_MORADOR_EXPIRATION_HOURS: ${APP_CONVITE_MORADOR_EXPIRATION_HOURS:-72}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_AUTH: ${SMTP_AUTH:-true}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      JAVA_TOOL_OPTIONS: >-
        -Dapp.uploads.dir=/opt/condomanager/uploads
        -Dfile.encoding=UTF-8
    volumes:
      - condo_uploads:/opt/condomanager/uploads

    networks:
      - web

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.condotech.rule=Host(`condoapi.doistech.com.br`)"
      - "traefik.http.routers.condotech.entrypoints=web,websecure"
      - "traefik.http.routers.condotech.tls.certresolver=le"
      - "traefik.http.services.condotech.loadbalancer.server.port=8080"
volumes:
  condo_uploads:
  letsencrypt:

networks:
  web:
    driver: bridge

