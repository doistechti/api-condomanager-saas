# ===============================
# Application
# ===============================
spring.application.name=api-condo-manager-saas

# ===============================
# Datasource - MySQL (PRODUÃÃO via ENV VARS)
# ===============================
spring.datasource.url=jdbc:mysql://${BANCO_HOST_PRD}:${BANCO_PORTA_PRD}/${BANCO_SCHEMA_PRD}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${BANCO_USUARIO_PRD}
spring.datasource.password=${BANCO_SENHA_PRD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Jackson
# ===============================
#spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=America/Sao_Paulo

# ===============================
# Logging (desenvolvimento)
# ===============================
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# Swagger / OpenAPI (se usar)
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# File Upload (se necessÃ¡rio depois)
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# JWT (PRODUÃÃO via ENV VARS)
# ===============================
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:480}

app.bootstrap.roles.enabled=true
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${SMTP_USERNAME}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:3000}
app.frontend.morador-convite-path=/convite/morador
app.frontend.reset-password-path=/resetar-senha
app.frontend.admin-condominio-convite-path=/convite/admin-condominio
app.convite.morador.expiration-hours=72
app.convite.admin-condominio.expiration-hours=72
app.auth.reset-password.expiration-minutes=${APP_RESET_PASSWORD_EXPIRATION_MINUTES:30}
