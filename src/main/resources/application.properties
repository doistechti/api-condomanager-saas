# ===============================
# Application
# ===============================
spring.application.name=api-condo-manager-saas

# ===============================
# Datasource - MySQL (PRODU«√O via ENV VARS)
# ===============================
spring.datasource.url=jdbc:mysql://${BANCO_HOST_PRD}:${BANCO_PORTA_PRD}/${BANCO_SCHEMA_PRD}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${BANCO_USUARIO_PRD}
spring.datasource.password=${BANCO_SENHA_PRD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Jackson
# ===============================
#spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=America/Sao_Paulo

# ===============================
# Logging (desenvolvimento)
# ===============================
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# Swagger / OpenAPI (se usar)
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# File Upload (se necess·rio depois)
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# JWT (PRODU«√O via ENV VARS)
# ===============================
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:480}

app.bootstrap.roles.enabled=true
app.uploads.dir=uploads

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=doistechti@gmail.com
spring.mail.password=SUA_SENHA_DE_APP_GOOGLE
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=doistechti@gmail.com
app.frontend.base-url=http://localhost:3000
app.frontend.morador-convite-path=/convite/morador
app.convite.morador.expiration-hours=72