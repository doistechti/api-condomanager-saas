<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trial liberado</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, Helvetica, sans-serif; color:#1f2937;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#f4f6f8; margin:0; padding:0;">
    <tr>
        <td align="center" style="padding:32px 16px;">
            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:600px; background:#ffffff; border-radius:16px; overflow:hidden; border:1px solid #e5e7eb;">
                <tr>
                    <td style="background:linear-gradient(135deg, #0f4c81, #2563eb); padding:28px 32px; text-align:center;">
                        <div style="font-size:28px; font-weight:bold; color:#ffffff; margin-bottom:6px;">
                            Condomínio Tech
                        </div>
                        <div style="font-size:14px; color:#dbeafe;">
                            Trial liberado
                        </div>
                    </td>
                </tr>
                <tr>
                    <td style="padding:32px;">
                        <h1 style="margin:0 0 16px; font-size:24px; line-height:1.3; color:#111827;">
                            Seu ambiente já está pronto
                        </h1>
                        <p style="margin:0 0 16px; font-size:15px; line-height:1.6; color:#374151;">
                            Olá, <strong>${nomeResponsavel}</strong>.
                        </p>
                        <p style="margin:0 0 24px; font-size:15px; line-height:1.6; color:#374151;">
                            O trial do condomínio <strong>${nomeCondominio}</strong> foi liberado com sucesso.
                        </p>
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin:0 0 24px; background:#f9fafb; border:1px solid #e5e7eb; border-radius:12px;">
                            <tr>
                                <td style="padding:20px;">
                                    <p style="margin:0 0 8px; font-size:15px; color:#111827;"><strong>Portal:</strong> <a href="${portalUrl}" target="_blank" style="color:#2563eb; text-decoration:none;">${portalUrl}</a></p>
                                    <p style="margin:0; font-size:15px; color:#111827;"><strong>Encerramento previsto:</strong> ${dataVencimento}</p>
                                </td>
                            </tr>
                        </table>
                        <p style="margin:0; font-size:15px; line-height:1.6; color:#374151;">
                            Se precisar, responda este e-mail ou fale com o time CondoManager.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
