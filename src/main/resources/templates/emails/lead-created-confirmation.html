<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recebemos seu interesse</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, Helvetica, sans-serif; color:#1f2937;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#f4f6f8; margin:0; padding:0;">
    <tr>
        <td align="center" style="padding:32px 16px;">
            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:600px; background:#ffffff; border-radius:16px; overflow:hidden; border:1px solid #e5e7eb;">
                <tr>
                    <td style="background:linear-gradient(135deg, #0f4c81, #2563eb); padding:28px 32px; text-align:center;">
                        <div style="font-size:28px; font-weight:bold; color:#ffffff; margin-bottom:6px;">
                            Condomínio Tech
                        </div>
                        <div style="font-size:14px; color:#dbeafe;">
                            Recebemos seu interesse
                        </div>
                    </td>
                </tr>
                <tr>
                    <td style="padding:32px;">
                        <h1 style="margin:0 0 16px; font-size:24px; line-height:1.3; color:#111827;">
                            Cadastro recebido com sucesso
                        </h1>
                        <p style="margin:0 0 16px; font-size:15px; line-height:1.6; color:#374151;">
                            Olá, <strong>${nomeResponsavel}</strong>.
                        </p>
                        <p style="margin:0 0 16px; font-size:15px; line-height:1.6; color:#374151;">
                            Recebemos seu interesse no CondoManager para o condomínio <strong>${nomeCondominio}</strong>.
                        </p>
                        <p style="margin:0; font-size:15px; line-height:1.6; color:#374151;">
                            Nosso time vai analisar o cadastro e retornar em breve com os próximos passos.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
