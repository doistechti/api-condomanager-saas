<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novo lead</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, Helvetica, sans-serif; color:#1f2937;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#f4f6f8; margin:0; padding:0;">
    <tr>
        <td align="center" style="padding:32px 16px;">
            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:600px; background:#ffffff; border-radius:16px; overflow:hidden; border:1px solid #e5e7eb;">
                <tr>
                    <td style="background:linear-gradient(135deg, #1f2937, #334155); padding:28px 32px; text-align:center;">
                        <div style="font-size:28px; font-weight:bold; color:#ffffff; margin-bottom:6px;">
                            Condomínio Tech
                        </div>
                        <div style="font-size:14px; color:#cbd5e1;">
                            Novo lead recebido
                        </div>
                    </td>
                </tr>
                <tr>
                    <td style="padding:32px;">
                        <h1 style="margin:0 0 16px; font-size:24px; line-height:1.3; color:#111827;">
                            Lead novo na fila comercial
                        </h1>
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f9fafb; border:1px solid #e5e7eb; border-radius:12px;">
                            <tr>
                                <td style="padding:20px;">
                                    <p style="margin:0 0 8px; font-size:15px; color:#111827;"><strong>Condomínio:</strong> ${nomeCondominio}</p>
                                    <p style="margin:0 0 8px; font-size:15px; color:#111827;"><strong>Responsável:</strong> ${responsavel}</p>
                                    <p style="margin:0 0 8px; font-size:15px; color:#111827;"><strong>E-mail:</strong> ${email}</p>
                                    <p style="margin:0 0 8px; font-size:15px; color:#111827;"><strong>Telefone:</strong> ${telefone}</p>
                                    <p style="margin:0 0 8px; font-size:15px; color:#111827;"><strong>Unidades estimadas:</strong> ${unidadesEstimadas}</p>
                                    <p style="margin:0; font-size:15px; color:#111827;"><strong>Mensagem:</strong> ${mensagem}</p>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
